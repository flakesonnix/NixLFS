# garnix.yaml configuration for NixLFS
# https://garnix.io

systems:
  - x86_64-linux

inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixos-24.05
    branch: nixos-24.05

# Build key packages - each transitively builds dependencies
outputs:
  - path: packages.x86_64-linux.crossToolchain.libstdcpp
  - path: packages.x86_64-linux.crossTempTools.gcc2
  - path: packages.x86_64-linux.fhs.utillinux
  - path: packages.x86_64-linux.ss.e2fsprogs
  - path: packages.x86_64-linux.sysconf.kernel
