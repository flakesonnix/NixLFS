# garnix.yaml configuration for NixLFS
# https://garnix.io

systems:
  - x86_64-linux

inputs:
  nixpkgs:
    url: github:NixOS/nixpkgs/nixos-24.05
    branch: nixos-24.05

# Build ALL packages (using default outputs for each category)
outputs:
  # Cross toolchain
  - path: packages.x86_64-linux.crossToolchain.default

  # Cross temp tools
  - path: packages.x86_64-linux.crossTempTools.default

  # FHS
  - path: packages.x86_64-linux.fhs.default

  # System software
  - path: packages.x86_64-linux.ss.default

  # System configuration (includes kernel)
  - path: packages.x86_64-linux.sysconf.default
  - path: packages.x86_64-linux.sysconf.kernel
